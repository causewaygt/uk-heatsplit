name: Update heat split

on:
  schedule:
    - cron: '17 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install requests

      - name: Build data.json
        run: python scripts/build.py

      - name: Commit and push
        run: |
          git config user.name "heatsplit-bot"
          git config user.email "bot@users.noreply.github.com"
          git add docs/data.json
          git commit -m "data update $(date -u +%F)" || echo "no change"
          git push

      - name: Failure marker
        if: failure()
        run: echo "::error::heatsplit daily build failed - check feed status"
